openapi: 3.1.0
info:
  title: VetLink API
  version: 0.1.0
  description: |
    Public API for VetLink backend (Uusimaa pilot). JWT-protected unless stated otherwise.
    This spec covers Owner booking MVP + Preferences and supporting admin ops.
  license:
    name: MIT
    url: https://opensource.org/license/mit/
servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.vetlink.fi
    description: Production
security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Pets
    description: Owner pet management
  - name: Clinics
    description: Clinic directory and admin operations
  - name: Vets
    description: Vet profiles and lookup
  - name: Availability
    description: Vet and clinic slot availability
  - name: Appointments
    description: Booking and appointment management
  - name: Notifications
    description: Notification preferences and reminder delivery
  - name: Dashboard
    description: Exports and metrics
  - name: System
    description: Health checks and system endpoints
  - name: Admin
    description: Internal invite-based onboarding for clinics and vets

paths:
  /api/auth/signup:
    post:
      tags: [Auth]
      security: []
      summary: Create a user account
      operationId: authSignup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupDTO"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Log in and receive a JWT
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginDTO"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      operationId: authMe
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/users/me:
    patch:
      tags: [Auth]
      summary: Update my user profile
      operationId: usersUpdateMe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateDTO"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/pets:
    get:
      tags: [Pets]
      summary: List my pets
      operationId: petsList
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags: [Pets]
      summary: Create a pet
      operationId: petsCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PetCreateDTO"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/pets/{id}:
    get:
      tags: [Pets]
      summary: Get a pet by ID (must own)
      operationId: petsGet
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      tags: [Pets]
      summary: Update a pet (partial)
      operationId: petsUpdate
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PetUpdateDTO"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Pets]
      summary: Soft-delete a pet
      operationId: petsDelete
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: No Content
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/clinics:
    get:
      tags: [Clinics]
      summary: List clinics
      operationId: clinicsList
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Clinic"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags: [Clinics]
      summary: Create clinic (CLINIC_ADMIN only)
      operationId: clinicsCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClinicCreateDTO"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/clinics/{id}:
    get:
      tags: [Clinics]
      summary: Get clinic by ID
      operationId: clinicsGet
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/vets:
    get:
      tags: [Vets]
      summary: List vets (optional clinicId filter)
      operationId: vetsList
      parameters:
        - in: query
          name: clinicId
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vet"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags: [Vets]
      summary: Create vet (linked to user)
      operationId: vetsCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VetCreateDTO"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vet"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/vets/{id}:
    get:
      tags: [Vets]
      summary: Get vet by ID
      operationId: vetsGet
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vet"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/availability:
    post:
      tags: [Availability]
      summary: Create availability (VET only)
      operationId: availabilityCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvailabilityCreateDTO"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Availability"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/availability/{vetId}:
    get:
      tags: [Availability]
      summary: Get availability for a vet
      operationId: availabilityGetForVet
      parameters:
        - in: path
          name: vetId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  availability:
                    type: array
                    items:
                      $ref: "#/components/schemas/Availability"
                required: [availability]
        "404":
          description: Vet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/availability/{availabilityId}:
    patch:
      tags: [Availability]
      summary: Update an availability block (VET only)
      operationId: availabilityUpdate
      parameters:
        - in: path
          name: availabilityId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvailabilityUpdateDTO"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  availability:
                    $ref: "#/components/schemas/Availability"
                required: [availability]

    delete:
      tags: [Availability]
      summary: Delete an availability block (VET only)
      operationId: availabilityDelete
      parameters:
        - in: path
          name: availabilityId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: No Content

  /api/availability/vets/{vetId}/available-slots:
    get:
      tags: [Availability]
      summary: Available slots for a vet on a date
      operationId: slotsGetForVet
      parameters:
        - in: path
          name: vetId
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: date
          required: true
          description: ISO date (YYYY-MM-DD) in Europe/Helsinki
          schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlotsResponse"
        "400":
          description: Bad Request (invalid date)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Vet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/availability/clinics/{clinicId}/available-slots:
    get:
      tags: [Availability]
      summary: Available slots across a clinic on a date
      operationId: slotsGetForClinic
      parameters:
        - in: path
          name: clinicId
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: date
          required: true
          schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
        - in: query
          name: vetId
          required: false
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicSlotsResponse"
        "400":
          description: Bad Request (invalid date)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Clinic not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/appointments:
    get:
      tags: [Appointments]
      summary: List appointments for the current owner
      operationId: appointmentsListMine
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags: [Appointments]
      summary: Create an appointment
      description: |
        Idempotent create. Provide an `Idempotency-Key` header per create attempt.
        Retries with the same key and identical body return the original response.
        Reusing a key with a different body or endpoint returns 409.
      operationId: appointmentsCreate
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          description: Use to safely retry without double-booking
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentCreateDTO"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "409":
          description: >
            Conflict. Either:
            - the requested time slot overlaps an existing appointment, or
            - the Idempotency-Key was reused with a different request body or endpoint.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "400":
          description: Bad Request (missing/invalid Idempotency-Key or invalid body)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/appointments/vet:
    get:
      tags: [Appointments]
      summary: List appointments for the current vet
      operationId: appointmentsListForVet
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/appointments/{id}:
    patch:
      tags: [Appointments]
      summary: Reschedule an appointment (owner only)
      operationId: appointmentsReschedule
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentRescheduleDTO"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Appointment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Time conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/appointments/{id}/cancel:
    patch:
      tags: [Appointments]
      summary: Cancel an appointment
      operationId: appointmentsCancel
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Cancelled or already cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentCancelResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Appointment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/notifications/preferences:
    get:
      tags: [Notifications]
      summary: Get my notification preferences (auto-creates defaults)
      operationId: notificationsGetPreferences
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreference"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      tags: [Notifications]
      summary: Update my notification preferences
      operationId: notificationsUpdatePreferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationPreferenceUpdateDTO"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreference"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/notifications/unsubscribe/{token}:
    get:
      tags: [Notifications]
      summary: One-click email unsubscribe
      operationId: notificationsUnsubscribeEmail
      description: |
        Disables email reminders for the user associated with the token. The link is opaque, expiring, and single-use, but the operation is idempotent.
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Unsubscribed (idempotent)
          content:
            text/html:
              schema: { type: string }
        "400":
          description: Invalid or expired token
          content:
            text/html:
              schema: { type: string }

  /api/dashboard/export/appointments.csv:
    get:
      tags: [Dashboard]
      summary: Export appointments as CSV (role-scoped)
      operationId: dashboardExportAppointmentsCsv
      responses:
        "200":
          description: CSV stream
          content:
            text/csv:
              schema: { type: string, format: binary }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/admin/clinics/invite-admin:
    post:
      tags: [Admin]
      summary: Invite a clinic admin (SUPER_ADMIN only)
      operationId: adminInviteClinicAdmin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, clinicId]
              properties:
                email: { type: string, format: email }
                clinicId: { type: string, format: uuid }
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema:
                type: object
                properties:
                  invite:
                    $ref: "#/components/schemas/Invite"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden (not SUPER_ADMIN)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Clinic not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/admin/vets/invite:
    post:
      tags: [Admin]
      summary: Invite a vet (CLINIC_ADMIN only)
      operationId: adminInviteVet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, vetId]
              properties:
                email: { type: string, format: email }
                vetId: { type: string, format: uuid }
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema:
                type: object
                properties:
                  invite:
                    $ref: "#/components/schemas/Invite"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden (not CLINIC_ADMIN or vet not in clinic)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Vet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/accept-invite:
    post:
      tags: [Auth]
      summary: Accept an invite and set password
      operationId: authAcceptInvite
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInviteDTO"
      responses:
        "201":
          description: Account created from invite
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user: { $ref: "#/components/schemas/User" }
        "400":
          description: Invalid or expired token, or bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Invite already used or conflicting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /healthz:
    get:
      tags: [System]
      security: []
      summary: Liveness probe
      operationId: healthz
      responses:
        "200": { description: OK }

  /readyz:
    get:
      tags: [System]
      security: []
      summary: Readiness probe
      operationId: readyz
      responses:
        "200": { description: OK }
        "503":
          description: Not ready
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Role:
      type: string
      enum: [OWNER, VET, CLINIC_ADMIN, SUPER_ADMIN]

    Weekday:
      type: string
      enum: [MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY]

    Error:
      type: object
      properties:
        message: { type: string }
        code: { type: string }
      required: [message]

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        fullName: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        clinicId: { type: [string, "null"], format: uuid }
        vetId: { type: [string, "null"], format: uuid }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, email, fullName, role, createdAt, updatedAt]

    Clinic:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        address: { type: string }
        city: { type: string }
        zipCode: { type: string }
        emergency: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        [
          id,
          name,
          email,
          phone,
          address,
          city,
          zipCode,
          emergency,
          createdAt,
          updatedAt,
        ]

    ClinicCreateDTO:
      type: object
      required: [name, email, phone, address, city, zipCode]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        address: { type: string }
        city: { type: string }
        zipCode: { type: string }
        emergency: { type: boolean, default: false }

    Vet:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        specialization: { type: [string, "null"] }
        clinicId: { type: string, format: uuid }
        userId: { type: [string, "null"], format: uuid }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, clinicId, createdAt, updatedAt]

    VetCreateDTO:
      type: object
      required: [name, clinicId]
      properties:
        name: { type: string }
        specialization: { type: [string, "null"] }
        clinicId: { type: string, format: uuid }
        userId: { type: [string, "null"], format: uuid }

    Availability:
      type: object
      properties:
        id: { type: string, format: uuid }
        day: { $ref: "#/components/schemas/Weekday" }
        startTime: { type: string, pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$" }
        endTime: { type: string, pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$" }
        vetId: { type: string, format: uuid }
      required: [id, day, startTime, endTime, vetId]

    AvailabilityCreateDTO:
      type: object
      required: [day, startTime, endTime]
      properties:
        day: { $ref: "#/components/schemas/Weekday" }
        startTime: { type: string }
        endTime: { type: string }

    AvailabilityUpdateDTO:
      type: object
      properties:
        day: { $ref: "#/components/schemas/Weekday" }
        startTime: { type: string }
        endTime: { type: string }

    Pet:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        species: { type: string }
        breed: { type: [string, "null"] }
        birthDate: { type: string, format: date-time }
        ownerId: { type: string, format: uuid }
        isDeleted: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        [id, name, species, birthDate, ownerId, isDeleted, createdAt, updatedAt]

    PetCreateDTO:
      type: object
      required: [name, species, birthDate]
      properties:
        name: { type: string }
        species: { type: string }
        breed: { type: [string, "null"] }
        birthDate: { type: string, format: date-time }

    PetUpdateDTO:
      type: object
      properties:
        name: { type: string }
        species: { type: string }
        breed: { type: [string, "null"] }
        birthDate: { type: string, format: date-time }

    Appointment:
      type: object
      properties:
        id: { type: string, format: uuid }
        date: { type: string, format: date-time }
        endTime: { type: string, format: date-time }
        cancelledAt: { type: [string, "null"], format: date-time }
        reason: { type: string }
        emergency: { type: boolean }
        petId: { type: string, format: uuid }
        ownerId: { type: string, format: uuid }
        clinicId: { type: string, format: uuid }
        vetId: { type: string, format: uuid }
        notificationLogs:
          type: array
          readOnly: true
          items: { $ref: "#/components/schemas/NotificationLog" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        [
          id,
          date,
          endTime,
          reason,
          emergency,
          petId,
          ownerId,
          clinicId,
          vetId,
          createdAt,
          updatedAt,
        ]

    UserUpdateDTO:
      type: object
      properties:
        fullName: { type: string }

    AppointmentCreateDTO:
      type: object
      required: [date, reason, petId, clinicId, vetId]
      properties:
        date:
          type: string
          format: date-time
          description: Start time in ISO (Europe/Helsinki)
        reason: { type: string }
        emergency: { type: boolean, default: false }
        petId: { type: string, format: uuid }
        clinicId: { type: string, format: uuid }
        vetId: { type: string, format: uuid }

    AppointmentRescheduleDTO:
      type: object
      required: [date]
      properties:
        date:
          type: string
          format: date-time

    AppointmentsResponse:
      type: object
      properties:
        appointments:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"
      required: [appointments]

    AppointmentResponse:
      type: object
      properties:
        appointment:
          $ref: "#/components/schemas/Appointment"
      required: [appointment]

    AppointmentCancelResponse:
      type: object
      properties:
        message: { type: string }
        appointment:
          $ref: "#/components/schemas/Appointment"
      required: [message]

    NotificationPreference:
      type: object
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        emailEnabled: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, userId, emailEnabled, createdAt, updatedAt]

    NotificationPreferenceUpdateDTO:
      type: object
      properties:
        emailEnabled: { type: boolean }

    NotificationLog:
      type: object
      properties:
        id: { type: string, format: uuid }
        appointmentId: { type: string, format: uuid }
        sentVia: { type: string }
        sentAt: { type: string, format: date-time }
        success: { type: boolean }
        detail: { type: [string, "null"] }

    SlotsResponse:
      type: object
      properties:
        vetId: { type: string, format: uuid }
        date: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
        slotMinutes: { type: integer }
        slots:
          type: array
          items: { type: string, description: "HH:mm" }
      required: [vetId, date, slotMinutes, slots]

    ClinicSlotsResponse:
      type: object
      properties:
        clinicId: { type: string, format: uuid }
        date: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
        slotMinutes: { type: integer }
        slotsByVet:
          type: object
          additionalProperties:
            type: array
            items: { type: string, description: "HH:mm" }
      required: [clinicId, date, slotMinutes, slotsByVet]

    Invite:
      type: object
      properties:
        id: { type: string, format: uuid }
        token: { type: string }
        email: { type: string, format: email }
        role: { $ref: "#/components/schemas/Role" }
        clinicId: { type: [string, "null"], format: uuid }
        vetId: { type: [string, "null"], format: uuid }
        usedAt: { type: [string, "null"], format: date-time }
        expiresAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
      required: [id, token, email, role, expiresAt, createdAt]

    AcceptInviteDTO:
      type: object
      required: [token, fullName, password]
      properties:
        token: { type: string, minLength: 1 }
        fullName: { type: string }
        password: { type: string, minLength: 8 }

    SignupDTO:
      type: object
      required: [email, password, fullName]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        fullName: { type: string }
        role:
          $ref: "#/components/schemas/Role"
      description: If role is omitted, server will default to OWNER.

    LoginDTO:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    AuthResponse:
      type: object
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/User" }
      required: [token, user]
