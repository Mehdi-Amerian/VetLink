name: CI

on:
  push:
    branches: [ "main", "backend", "feature/**" ]
  pull_request:
    branches: [ "main", "backend" ]

permissions:
  contents: read
  packages: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend  # all run steps execute inside backend/

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vetlink_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vetlink_ci?schema=public
      NODE_ENV: test
      TZ: Europe/Helsinki

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply DB migrations
        run: npx prisma migrate deploy

      - name: OpenAPI lint
        run: npx redocly lint openapi.yaml --config redocly.yaml

      - name: Generate SDK types
        run: npx openapi-typescript ./openapi.yaml -o ./src/sdk/types.ts

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test -- -- runInBand
        
  docker:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/vetlink-backend:$(echo $GITHUB_SHA | cut -c1-7)
          docker build -t $IMAGE .
          docker push $IMAGE
